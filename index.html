<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TRUSTCHAIN - Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body data-page="login">
  <main class="login-page">
    <section class="login-panel">
      <h1 class="logo">
        <span>TRUST</span><span class="green">CHAIN</span>
      </h1>

      <h2 class="page-title">Sign In</h2>

      <form id="loginForm">
        <div class="field-group">
          <label for="loginUsername">USERNAME</label>
          <input
            id="loginUsername"
            type="text"
            autocomplete="username"
            required
          />
        </div>

        <div class="field-group password-row">
          <div class="password-label-line">
            <label for="loginPassword">PASSWORD</label>
            <a href="#" class="small-link" id="forgotPasswordLink">forget password?</a>
          </div>

          <input
            id="loginPassword"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>

        <a href="signup.html" class="create-link">create new account?</a>

        <button type="submit" class="signin-button">SIGN IN</button>

        <p id="message"></p>
      </form>
    </section>
  </main>
</body>
</html>
