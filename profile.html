<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TRUSTCHAIN - Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />

  <!-- QR code generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script src="trust-graph.js" defer></script>
  <script src="script.js" defer></script>
</head>

<body data-page="profile">
  <main class="page">
    <section class="card">
      <h1 id="profileUsername">Loading...</h1>

      <p>
        <strong>Role:</strong>
        <span id="profileRole">Loading...</span>
      </p>

      <p>
        <strong>Confidence Score:</strong>
        <span id="confidenceScore">0</span>
      </p>

      <p>
        <strong>Vouches:</strong>
        <span id="vouchCount">0</span>
      </p>

      <div class="qr-box">
        <div id="qrCode"></div>
        <p class="qr-small">
          Profile ID:
          <span id="profileId">Loading...</span>
        </p>
      </div>

      <section class="trust-graph-panel" aria-labelledby="trustGraphHeading">
        <div class="trust-graph-header">
          <h2 id="trustGraphHeading">Trust Graph</h2>

          <p class="trust-graph-legend">
            Each dot is a person. Lines are vouches. Larger dots mean higher trust.
          </p>
        </div>

        <div id="trustGraphMount" class="trust-graph-mount"></div>
      </section>

      <div class="button-row">
        <button id="scanButton">SCAN QR</button>
        <button id="logoutButton" class="secondary-button">LOG OUT</button>
      </div>

      <p id="message"></p>
    </section>
  </main>
</body>
</html>
