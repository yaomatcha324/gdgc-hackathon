<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKOUT - Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="login-page">
    <section class="login-panel">
      <h1 class="logo">
        <span>BLACK</span><span class="green">OUT</span>
      </h1>

      <form id="loginForm">
        <div class="field-group">
          <label for="username">USERNAME</label>
          <input id="username" type="text" autocomplete="username" />
        </div>

        <div class="field-group password-row">
          <div class="password-label-line">
            <label for="password">PASSWORD</label>
            <a href="#" class="small-link">forget password?</a>
          </div>
          <input id="password" type="password" autocomplete="current-password" />
        </div>

        <a href="#" class="create-link">create new account?</a>

        <button type="submit" class="signin-button">SIGN IN</button>

        <p id="message"></p>
      </form>
    </section>
  </main>

  <script>
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username) {
        message.textContent = "Please enter your username.";
        return;
      }

      if (!password) {
        message.textContent = "Please enter your password.";
        return;
      }

      // Mock password check before backend login is ready
      if (password !== "blackout") {
        message.textContent = "Wrong password.";
        return;
      }

      // Temporary mock login
      localStorage.setItem("currentUserId", "1");
      localStorage.setItem("currentUsername", username);
      localStorage.setItem("currentRole", "Citizen");

      // This line jumps to another page
      window.location.href = "profile.html?id=1";
    });
  </script>
</body>
</html>
