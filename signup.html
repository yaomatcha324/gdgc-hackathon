<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TRUSTCHAIN - Sign Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body data-page="signup">
  <main class="login-page">
    <section class="login-panel">
      <h1 class="logo">
        <span>TRUST</span><span class="green">CHAIN</span>
      </h1>

      <h2 class="page-title">Create Account</h2>

      <form id="signupForm">
        <div class="field-group">
          <label for="signupUsername">USERNAME</label>
          <input
            id="signupUsername"
            type="text"
            autocomplete="username"
            required
          />
        </div>

        <div class="field-group">
          <label for="signupPassword">PASSWORD</label>
          <input
            id="signupPassword"
            type="password"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field-group">
          <label for="signupRole">ROLE</label>
          <input
            id="signupRole"
            type="text"
            placeholder="Citizen"
            autocomplete="off"
          />
        </div>

        <button type="submit" class="signin-button">SIGN UP</button>

        <a href="index.html" class="create-link">already have an account?</a>

        <p id="message"></p>
      </form>
    </section>
  </main>
</body>
</html>
